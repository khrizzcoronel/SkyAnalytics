services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_POCKETBASE_URL=${NEXT_PUBLIC_POCKETBASE_URL:-http://localhost:8090}
      - RAPIDAPI_PROXY_SECRET=${RAPIDAPI_PROXY_SECRET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - POCKETBASE_URL=${POCKETBASE_URL:-http://pocketbase:8090}
      - POCKETBASE_ADMIN_EMAIL=${POCKETBASE_ADMIN_EMAIL}
      - POCKETBASE_ADMIN_PASSWORD=${POCKETBASE_ADMIN_PASSWORD}
      - MONETDB_HOST=${MONETDB_HOST:-monetdb}
      - MONETDB_PORT=${MONETDB_PORT:-50000}
      - MONETDB_USER=${MONETDB_USER:-monetdb}
      - MONETDB_PASS=${MONETDB_PASS}
      - MONETDB_DB=${MONETDB_DB:-demo}
      - S3_ML_BUCKET=${S3_ML_BUCKET:-skyanalytics-ml}
      - ML_FALLBACK_MOCK=${ML_FALLBACK_MOCK:-true}
      - POSTMORTEM_BANNED_NAMES=${POSTMORTEM_BANNED_NAMES}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; r=urllib.request.urlopen('http://localhost:8000/health'); exit(0 if r.status==200 and b'ok' in r.read() else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      pocketbase:
        condition: service_healthy
      monetdb:
        condition: service_healthy

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb_data
      - ./pb_schema.json:/pb_schema.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/api/health | grep -q '200' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  importer:
    build:
      context: ./backend/import
    restart: "no"
    depends_on:
      pocketbase:
        condition: service_healthy
    environment:
      - CHECKPOINT_FILE=/data/importer_checkpoint.json
      - DB_PATH=/pb_data/data.db
      - CSV_PATH=/data/flight_data_2024.csv
    volumes:
      - pb_data:/pb_data:rw
      - ./flight_data_2024.csv:/data/flight_data_2024.csv:ro
      - importer_data:/data:rw

  monetdb:
    image: monetdb/monetdb:latest
    ports:
      - "50000:50000"
    environment:
      - MDB_DB_ADMIN_PASS=${MONETDB_PASS}
    volumes:
      - monetdb_data:/var/monetdb5
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo \"${MONETDB_PASS}\" | mclient --user=monetdb --database=\"${MONETDB_DB:-monetdb}\" --statement='SELECT 1;'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  pb_data:
  monetdb_data:
  importer_data:
